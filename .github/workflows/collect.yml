name: 트렌드 수집

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: '수집할 플랫폼 (쉼표 구분: kakaopage,munpia,naver,naver_series)'
        required: false
        default: 'kakaopage'
      options_kakaopage:
        description: '카카오페이지 옵션 (JSON)'
        required: false
        default: ''
      options_munpia:
        description: '문피아 옵션 (JSON)'
        required: false
        default: ''
      options_naver:
        description: '네이버 웹툰 옵션 (JSON)'
        required: false
        default: ''
      options_naver_series:
        description: '네이버 시리즈 옵션 (JSON)'
        required: false
        default: '{"periods":["daily"],"categories":["fantasy","modern","martial"],"limit":20}'

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Python 패키지 설치
        run: pip install -r requirements.txt

      - name: Node.js 패키지 설치
        run: npm install docx

      - name: 트렌드 수집 실행
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
          COLLECT_OPTIONS_KAKAOPAGE: ${{ github.event.inputs.options_kakaopage }}
          COLLECT_OPTIONS_MUNPIA: '{"free_today":true,"paid_today":true,"paid_new":true,"paid_rising":true,"include_description":false,"limit":10}'
          COLLECT_OPTIONS_NAVER: '{"ranking":true,"genre":true,"day":true,"trend_analysis":true}'
          COLLECT_OPTIONS_NAVER_SERIES: '{"periods":["daily"],"categories":["fantasy","modern","martial"],"limit":20}'
        run: python main.py
